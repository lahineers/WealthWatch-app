<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - WealthWatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-box">
  <div class="login-logo">
    <img class="logopic" src="logo.png">
    WealthWatch
  </div>
  <div class="login-tagline" id="loginTagline">Sign in to your portfolio</div>

  <input id="username" placeholder="Username" autocomplete="username">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">

  <button id="mainBtn" onclick="login()">Sign in</button>
  <button onclick="toggleRegister()" style="background:none;color:var(--green-text);border:1px solid var(--border);margin-top:6px">
    Create account
  </button>
</div>

<script src="app.js"></script>
</body>
</html>
